<!DOCTYPE html> <!--Estructura html 5-->
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <!--meta tags-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--título-->
    <title>Gestion de Habitantes - Admin Hogar Seguro</title>
    <!--meta descripción-->
    <meta name="description" content="Página de administración para gestionar los habitantes registrados en el santuario. Permite crear, editar o eliminar registros fácilmente.">
     <!--favicon-->
    <link rel="icon" type="image/png" th:href="@{/favicon/favicon-96x96.png}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon/favicon.svg}" />
    <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}" />
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/apple-touch-icon.png}" />
    <link rel="manifest" th:href="@{/favicon/site.webmanifest}" />
    <!--Tipografías-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!--hoja de estilos bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!--biblioteca iconos bootsrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--hoja de estilos css-->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>


<body class="bg-light d-flex flex-column min-vh-100">


    <!--nav-->
    <nav class="navbar navbar-dark bg-dark mb-4 sticky-top z-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <a th:href="@{/admin}" class="btn btn-outline-light btn-sm me-2">Volver al Panel</a>
                <span class="navbar-text text-light ms-3">Gestión de Habitantes</span>
            </div>

            <div class="d-flex align-items-center flex-nowrap">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </button>
                </form>
            </div>
        </div>
    </nav>




    <div class="container mb-5 flex-grow-1">

        <div class="d-flex justify-content-between align-items-center mt-5 mb-5">
            <h2 class="mb-0 pb-0">Habitantes del Santuario</h2>
            <!--ruta mapp a archivo admin-formulario.html-->
            <a th:href="@{/admin/habitantes/nuevo}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-plus-circle"></i> Nuevo Habitante
            </a>
        </div>



        <!--tabla gestion habitantes-->
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Especie</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>

                        <tr th:each="res : ${residents}">

                            <td th:text="${res.id}">1</td>
                            <td th:text="${res.name}">Nombre</td>
                            <td th:text="${res.species}">Especie</td>
                            <td>
                                <span th:if="${res.available}" class="badge bg-success">Disponible</span>
                                <span th:unless="${res.available}" class="badge bg-secondary">No Disponible</span>
                            </td>

                            <td>
                                <div sec:authorize="hasRole('ADMIN')">
                                    <a th:href="@{/admin/habitantes/editar/{id}(id=${res.id})}" class="btn btn-sm btn-warning"><!--ruta mapp a archivo admin-formulario.html-->
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/habitantes/eliminar/{id}(id=${res.id})}" method="post" style="display:inline;"><!--ruta mapp a archivo admin-formulario.html-->
                                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás seguro de eliminar a este habitante?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>

                                <div sec:authorize="!hasRole('ADMIN')">
                                    <span class="text-muted small italic">Solo lectura</span>
                                </div>
                            </td>

                        </tr>

                    </tbody>
                </table>
            </div>
        </div>

    </div>

<!--footer-->
    <footer class="mt-auto">
        <div class="container">
            <div class="row justify-content-center">
            <div class="row justify-content-center text-center">
                <div class="col-9 col-md-8 copy">
                    <p>Copyright © 2026 - Santuario Hogar Seguro Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>


</body>
</html>
