<!DOCTYPE html>
<html lang="es"
         xmlns:th="http://www.thymeleaf.org">
    
<head>
    <!--meta tags-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--título-->
    <title>Solicitud - Hogar Seguro</title>
    <!--meta descripción-->
    <meta name="description" 
        content="Apoya a nuestro santuario vegano y ayúdanos a rescatar animales de la explotación. Completa el formulario de solicitud para ayudar al bienestar de los habitantes del santuario hogar seguro.">
    <!--favicon-->
    <link rel="icon" type="image/png" th:href="@{/favicon/favicon-96x96.png}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon/favicon.svg}" />
    <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}" />
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/apple-touch-icon.png}" />
    <link rel="manifest" th:href="@{/favicon/site.webmanifest}" />
    <!--Tipografías-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!--hoja de estilos bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!--biblioteca iconos bootsrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--hoja de estilos css-->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>


<body class="solicitud-html">

     <!--Formulario solicitud - (adoptar/amadrinar/voluntariado)-->
    <section class="seccion-solicitud">
        <div class="container solicitud-form col-lg-8 p-5">


            <div class="row text-center mb-5">
                <div class="col-12">
                    <h2 th:text="${residentName != null} ? 'Solicitud para ' + ${applicationDto.applicationType.name().toLowerCase()} + ' a ' + ${residentName} 
                                                        : 'Solicitud para ' + ${applicationDto.applicationType.name().toLowerCase()}">
                        Nueva Solicitud
                    </h2>
                    <p class="p-inicial">Por favor, completa los siguientes datos para procesar tu solicitud de ayuda:</p>
                </div>
            </div>


            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="contenedor-formulario-solicitud">
                        <form th:action="@{/solicitud}" th:object="${applicationDto}" method="post">
                            
                            <input type="hidden" th:field="*{applicationType}" />
                            <input type="hidden" th:field="*{residentId}" />

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label for="name">Nombre Completo</label>
                                    <input type="text" th:field="*{name}" class="form-control shadow-sm" id="name" placeholder="Ej. Juan Pérez">
                                    <div class="error-validacion" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label for="email">Correo Electrónico</label>
                                    <input type="email" th:field="*{email}" class="form-control shadow-sm" id="email" placeholder="correo@ejemplo.com">
                                    <div class="error-validacion" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-12 mb-4">
                                    <label for="phone">Número de Teléfono</label>
                                    <input type="text" th:field="*{phoneNumber}" class="form-control shadow-sm" id="phone" placeholder="Ej. 55 1234 5678">
                                    <div class="error-validacion" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="message">¿Por qué te interesa esta solicitud?</label>
                                <textarea th:field="*{message}" class="form-control shadow-sm" id="message" rows="4" placeholder="Cuéntanos un poco sobre tus motivaciones..."></textarea>
                                <div class="error-validacion" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></div>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn-confirmar-donacion">
                                    ENVIAR SOLICITUD <i class="bi bi-send-fill ms-2"></i>
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>


        </div>
    </section>


<!--footer-->
    <footer>
        <div class="container">

            <div class="row justify-content-center">

                <div class="row justify-content-center text-center">
                    <div class="col-9 col-md-8 copy">
                        <p>Este es un portal de solicitud simulada.</p>
                        <p>Copyright © 2026 - Santuario Hogar Seguro Todos los derechos reservados.</p>
                    </div>
                </div>

        </div>
    </footer>



</body>

</html>
