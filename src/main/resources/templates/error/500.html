<!DOCTYPE html> <!--Estructura html 5-->
<html lang="es"
         xmlns:th="http://www.thymeleaf.org"> 

<head>
    <!--meta tags-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--título-->
    <title>Error interno del servidor - Hogar Seguro</title>
    <!--meta descripción-->
    <meta name="description" content="Ocurrió un error interno inesperado en el sistema de administración de Hogar Seguro. Nuestro equipo técnico está trabajando para solucionarlo.">
     <!--favicon-->
    <link rel="icon" type="image/png" th:href="@{/favicon/favicon-96x96.png}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon/favicon.svg}" />
    <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}" />
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/apple-touch-icon.png}" />
    <link rel="manifest" th:href="@{/favicon/site.webmanifest}" />
    <!--Tipografías-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Signika:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!--hoja de estilos bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!--biblioteca iconos bootsrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--hoja de estilos css-->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>


<body class="bg-white d-flex flex-column min-vh-100">

    <div class="container my-auto text-center">
        <div class="row justify-content-center">
            <div class="col-md-7 mt-5 mb-5">

                <i class="bi bi-shield-exclamation text-danger" style="font-size: 5rem;"></i>
                <h1 class="display-4 fw-bold mostrar-h1">Servicio Temporalmente Interrumpido</h1>
                <h2 class="display-1 fw-bold text-dark pt-4">500</h2>
                <p class="lead text-secondary">Estamos trabajando para restablecer el servicio lo antes posible.</p>

                <div class="alert alert-warning border-0 shadow-sm">
                    <i class="bi bi-info-circle"></i> 
                    <span th:text="${errorMessage}">Mensaje amigable</span>
                </div>

                <a th:href="@{/}" class="btn btn-dark btn-lg shadow mb-5">Ir a la página principal</a>

            </div>
        </div>
    </div>



<!--footer-->
    <footer class="mt-auto">
        <div class="container">
            <div class="row justify-content-center text-center">
                <div class="col-9 col-md-8 copy">
                    <p>Copyright © 2026 - Santuario Hogar Seguro Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>


</body>

</html>
